global:
  random_seed: 42
  test_size: 0.2
  n_jobs: -1
  model_version: "1.0.0"

honeypot:
  n_estimators: 200
  max_depth: 8
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  synthetic_samples: 8000
  class_weights: "balanced"
  labels:
    - benign
    - recon_scanner
    - brute_force
    - bot_activity
    - suspicious_manual
    - exploit_like_pattern

malware:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  synthetic_samples: 8000
  class_weights: "balanced"
  labels:
    - likely_benign
    - suspicious
    - likely_malicious

network:
  contamination: 0.05
  n_estimators: 100
  max_samples: "auto"
  synthetic_samples: 8000
  supervised_labels:
    - normal
    - anomalous

posture:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  synthetic_samples: 8000
  class_weights: "balanced"
  labels:
    - low
    - medium
    - high
    - critical
